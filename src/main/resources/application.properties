spring.application.name=Cartagena-Segura

# =========================
# CONFIGURACION BASE DE DATOS POSTGRES (SUPABASE)
# =========================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Requerido por Supabase (SSL)
spring.datasource.hikari.data-source-properties.ssl=true
spring.datasource.hikari.data-source-properties.sslmode=require

# Pool de conexiones
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# =========================
# CONFIGURACION JPA / HIBERNATE
# =========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# =========================
# CONFIGURACION MONGODB (ATLAS)
# =========================
spring.data.mongodb.uri=${MONGO_URI}
spring.data.mongodb.database=${MONGO_DATABASE}
spring.data.mongodb.auto-index-creation=true

# =========================
# GROQ (REEMPLAZA SPRING AI)
# =========================
groq.api.key=${GROQ_API_KEY}
groq.api.url=https://api.groq.com/openai/v1/chat/completions

# =========================
# JWT
# =========================
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# =========================
# SWAGGER / OPENAPI
# =========================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.display-request-duration=true
springdoc.paths-to-exclude=/error

# =========================
# ACTUATOR
# =========================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# =========================
# LOGS
# =========================
logging.level.com.ProAula.Cartagena_Segura=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG

# =========================
# SERVIDOR
# =========================
server.port=${PORT:8080}

# =========================
# RECURSOS ESTATICOS
# =========================
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**

# =========================
# EMAIL (SENDGRID)
# =========================
sendgrid.api-key=${SENDGRID_API_KEY}
mail.from=${MAIL_FROM}